<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="./style.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="「を」の使い方を研究しています。きみも「を」の世界に飛び込もう。" />
        <title>を研究所</title>
    </head>
    <body>
        <p id="loading"></p>
        <div id="app">
            <header>
                <div>
                    <h1>を研究所</h1>
                    <span id="status"></span>
                </div>
            </header>
            <nav>
                <h2 id="sentence_example-title">例文<span></span></h2>
                <h2 id="noun_favorite-title">名詞<span></span></h2>
                <h2 id="verb_favorite-title">動詞<span></span></h2>
                <h2 id="generate-title">作文<span></span></h2>
                <h2 id="sentence_favorite-title">名文<span></span></h2>
            </nav>
            <main>
                <ul id="sentence_example-list">
                    <li id="dummyLi">例文を読む</li>
                </ul>
                <ul id="noun_favorite-list"></ul>
                <ul id="verb_favorite-list"></ul>
                <ul id="generate-list"></ul>
                <ul id="sentence_favorite-list"></ul>
            </main>
            <footer>
                <p>&copy;を研究所</p>
                <div>
                    <a href="https://github.com/wo-style/wo.git" target="_blank"
                        ><img src="./images/github.png" width="24px" height="auto"
                    /></a>
                    <a href="https://discord.gg/kE9F7p9T5T" target="_blank"
                        ><img src="./images/discord.png" width="24px" height="auto"
                    /></a>
                    <a href="" target="_blank"><img src="./images/youtube.png" width="24px" height="auto" /></a>
                </div>
            </footer>
            <div id="register" class="input-area">
                <h2>名詞/動詞/文を保存する</h2>
                <div>
                    <input type="text" id="inputNoun" placeholder="名詞" />
                    <span> を </span>
                    <input type="text" id="inputVerb" placeholder="動詞" />
                </div>
                <dl>
                    <dt class="hide-is-input">F</dt>
                    <dd class="hide-is-input">保存</dd>
                    <dt class="hide-is-input">ESC</dt>
                    <dd class="hide-is-input">終了</dd>
                    <dt>Enter</dt>
                    <dd>入力切替</dd>
                </dl>
            </div>
            <div id="search" class="input-area">
                <h2><span id="searchModeName">例文</span>を検索する</h2>
                <div>
                    <input type="text" id="inputSearch" placeholder="検索ワード" />
                </div>
                <dl>
                    <dt class="hide-is-input">F</dt>
                    <dd class="hide-is-input">検索</dd>
                    <dt class="hide-is-input">ESC</dt>
                    <dd class="hide-is-input">終了</dd>
                    <dt>Enter</dt>
                    <dd>入力切替</dd>
                </dl>
            </div>
        </div>
        <script type="module" src="/main.js"></script>
    </body>
</html>
